<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopPro</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="logo">ShopPro</div>
        <input class="search" placeholder="Search..." onkeyup="searchProducts(this.value)">
        <nav>
            <button onclick="toggleSidebar()">Categories</button>
            <button onclick="showPage('home')">Home</button>
            <button onclick="showPage('cart')">Cart (<span id="cartCount">0</span>)</button>
            <button onclick="showPage('wishlist')">Wishlist</button>
        </nav>
    </header>

    <div class="container">
        <div class="sidebar hidden" id="sidebar"></div>

        <div class="main">
            <div id="home">
                <div class="products" id="productList"></div>
            </div>

            <div id="cart" class="hidden">
                <h3>Cart</h3>
                <ul id="cartList"></ul>
                <h4>Total: ₹<span id="total"></span></h4>
            </div>

            <div id="wishlist" class="hidden">
                <h3>Wishlist</h3>
                <ul id="wishList"></ul>
            </div>
        </div>
    </div>
<script src="ecommerse.js"></script>
  
</body>

</html>
